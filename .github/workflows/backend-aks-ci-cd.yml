name: Backend Microservices AKS CI/CD

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  NAMESPACE: biblioteca
  KUSTOMIZE_OVERLAY: ${{ vars.KUSTOMIZE_OVERLAY || 'k8s/overlays/aks-no-domain' }}
  IDENTITY_IMAGE: biblioteca/identity-service
  CATALOG_IMAGE: biblioteca/catalog-service
  CHATBOT_IMAGE: biblioteca/chatbot-service

jobs:
  validate:
    name: Validate backend services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            catalog-service/package-lock.json
            chatbot-service/package-lock.json

      - name: Validate catalog-service
        working-directory: catalog-service
        run: |
          npm ci
          node --check index.js
          node --check src/app.js
          node --check src/services/ai.service.js
          npm audit --audit-level=high

      - name: Validate chatbot-service
        working-directory: chatbot-service
        run: |
          npm ci
          node --check index.js
          node --check src/app.js
          node --check src/services/chatbot.service.js
          npm audit --audit-level=high

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Test identity-service
        working-directory: mini-identity-api-dotnet-main/mini-identity-api-dotnet-main
        run: |
          dotnet restore MiniIdentityApi.slnx
          dotnet test MiniIdentityApi.slnx --configuration Release --no-restore

      - name: Validate Kubernetes manifests
        uses: azure/setup-kubectl@v4

      - name: Render Kustomize
        run: |
          OVERLAY="$(printf '%s' "$KUSTOMIZE_OVERLAY" | tr -d '\n\r')"
          echo "Using overlay: '$OVERLAY'"
          kubectl kustomize "$OVERLAY" > /tmp/backend-rendered.yaml

  deployment-config:
    name: Check AKS deployment configuration
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      deploy_enabled: ${{ steps.config.outputs.deploy_enabled }}

    steps:
      - name: Detect deployment configuration
        id: config
        env:
          AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}
          AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
          ACR_NAME: ${{ vars.ACR_NAME }}
          ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
          POSTGRES_HOST: ${{ vars.POSTGRES_HOST }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          AZURE_SERVICE_BUS_CONNECTION_STRING: ${{ secrets.AZURE_SERVICE_BUS_CONNECTION_STRING }}
        run: |
          missing=()
          for name in AKS_RESOURCE_GROUP AKS_CLUSTER_NAME ACR_NAME ACR_LOGIN_SERVER POSTGRES_HOST POSTGRES_USER AZURE_CREDENTIALS POSTGRES_PASSWORD HF_API_TOKEN GEMINI_API_KEY GROQ_API_KEY OPENROUTER_API_KEY REDIS_URL; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "deploy_enabled=false" >> "$GITHUB_OUTPUT"
            echo "### AKS deployment skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "CI passed, but CD was skipped because these GitHub repository variables/secrets are missing:" >> "$GITHUB_STEP_SUMMARY"
            for name in "${missing[@]}"; do
              echo "- \`$name\`" >> "$GITHUB_STEP_SUMMARY"
              echo "::warning::$name is not configured; AKS deployment will be skipped"
            done
            exit 0
          fi

          echo "deploy_enabled=true" >> "$GITHUB_OUTPUT"
          echo "### AKS deployment enabled" >> "$GITHUB_STEP_SUMMARY"
          echo "All required repository variables and secrets are configured." >> "$GITHUB_STEP_SUMMARY"

  build-and-deploy:
    name: Build images and deploy to AKS
    runs-on: ubuntu-latest
    needs:
      - validate
      - deployment-config
    if: needs.deployment-config.outputs.deploy_enabled == 'true' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deployment configuration
        env:
          AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}
          AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
          ACR_NAME: ${{ vars.ACR_NAME }}
          ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
          POSTGRES_HOST: ${{ vars.POSTGRES_HOST }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          AZURE_SERVICE_BUS_CONNECTION_STRING: ${{ secrets.AZURE_SERVICE_BUS_CONNECTION_STRING }}
        run: |
          missing=0
          for name in AKS_RESOURCE_GROUP AKS_CLUSTER_NAME ACR_NAME ACR_LOGIN_SERVER POSTGRES_HOST POSTGRES_USER AZURE_CREDENTIALS POSTGRES_PASSWORD HF_API_TOKEN GEMINI_API_KEY GROQ_API_KEY OPENROUTER_API_KEY REDIS_URL; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for backend deployment"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Build and push identity image
        run: |
          IMAGE="${{ vars.ACR_LOGIN_SERVER }}/${IDENTITY_IMAGE}:${{ github.sha }}"
          docker build -t "$IMAGE" ./mini-identity-api-dotnet-main/mini-identity-api-dotnet-main
          docker push "$IMAGE"

      - name: Build and push catalog image
        run: |
          IMAGE="${{ vars.ACR_LOGIN_SERVER }}/${CATALOG_IMAGE}:${{ github.sha }}"
          docker build -t "$IMAGE" ./catalog-service
          docker push "$IMAGE"

      - name: Build and push chatbot image
        run: |
          IMAGE="${{ vars.ACR_LOGIN_SERVER }}/${CHATBOT_IMAGE}:${{ github.sha }}"
          docker build -t "$IMAGE" ./chatbot-service
          docker push "$IMAGE"

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ vars.AKS_RESOURCE_GROUP }}" \
            --name "${{ vars.AKS_CLUSTER_NAME }}" \
            --overwrite-existing

      - name: Create namespace and secrets
        run: |
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic biblioteca-secrets \
            --namespace "$NAMESPACE" \
            --from-literal=POSTGRES_PASSWORD='${{ secrets.POSTGRES_PASSWORD }}' \
            --from-literal=HF_API_TOKEN='${{ secrets.HF_API_TOKEN }}' \
            --from-literal=GEMINI_API_KEY='${{ secrets.GEMINI_API_KEY }}' \
            --from-literal=GROQ_API_KEY='${{ secrets.GROQ_API_KEY }}' \
            --from-literal=OPENROUTER_API_KEY='${{ secrets.OPENROUTER_API_KEY }}' \
            --from-literal=REDIS_URL='${{ secrets.REDIS_URL }}' \
            --from-literal=AZURE_SERVICE_BUS_CONNECTION_STRING='${{ secrets.AZURE_SERVICE_BUS_CONNECTION_STRING }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Render backend manifests for this release
        env:
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL || 'https://bibliotechu.duckdns.org' }}
          POSTGRES_HOST: ${{ vars.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ vars.POSTGRES_PORT || '5432' }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB || 'catalog_db' }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          DB_SSL: ${{ vars.DB_SSL || 'true' }}
          AZURE_SERVICE_BUS_QUEUE: ${{ vars.AZURE_SERVICE_BUS_QUEUE || 'library-logging-queue' }}
        run: |
          OVERLAY="$(printf '%s' "$KUSTOMIZE_OVERLAY" | tr -d '\n\r')"
          echo "Using overlay: '$OVERLAY'"
          MANIFEST=/tmp/backend-rendered.yaml
          kubectl kustomize "$OVERLAY" > "$MANIFEST"
          sed -i "s|image: .*identity-service:.*|image: ${{ vars.ACR_LOGIN_SERVER }}/${IDENTITY_IMAGE}:${{ github.sha }}|" "$MANIFEST"
          sed -i "s|image: .*catalog-service:.*|image: ${{ vars.ACR_LOGIN_SERVER }}/${CATALOG_IMAGE}:${{ github.sha }}|" "$MANIFEST"
          sed -i "s|image: .*chatbot-service:.*|image: ${{ vars.ACR_LOGIN_SERVER }}/${CHATBOT_IMAGE}:${{ github.sha }}|" "$MANIFEST"
          PUBLIC_URL="$(printf '%s' "$PUBLIC_BASE_URL" | tr -d '\n\r')"
          if [ -n "$PUBLIC_URL" ]; then
            echo "Using PUBLIC_URL: '$PUBLIC_URL'"
            sed -i "s|CORS_ORIGINS: .*|CORS_ORIGINS: $PUBLIC_URL|" "$MANIFEST"
            sed -i "s|OPENROUTER_REFERER: .*|OPENROUTER_REFERER: $PUBLIC_URL|" "$MANIFEST"
          fi
          sed -i "s|POSTGRES_DB: .*|POSTGRES_DB: $POSTGRES_DB|" "$MANIFEST"
          sed -i "s|POSTGRES_USER: .*|POSTGRES_USER: $POSTGRES_USER|" "$MANIFEST"
          sed -i "s|DB_HOST: .*|DB_HOST: $POSTGRES_HOST|" "$MANIFEST"
          sed -i "s|DB_PORT: .*|DB_PORT: $POSTGRES_PORT|" "$MANIFEST"
          sed -i "s|DB_NAME: .*|DB_NAME: $POSTGRES_DB|" "$MANIFEST"
          sed -i "s|DB_USER: .*|DB_USER: $POSTGRES_USER|" "$MANIFEST"
          sed -i "s|DB_SSL: .*|DB_SSL: $DB_SSL|" "$MANIFEST"
          sed -i "s|AZURE_SERVICE_BUS_QUEUE: .*|AZURE_SERVICE_BUS_QUEUE: $AZURE_SERVICE_BUS_QUEUE|" "$MANIFEST"

      - name: Deploy backend manifests
        run: kubectl apply -f /tmp/backend-rendered.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/identity-service --namespace "$NAMESPACE" --timeout=420s
          kubectl rollout status deployment/catalog-service --namespace "$NAMESPACE" --timeout=420s
          kubectl rollout status deployment/chatbot-service --namespace "$NAMESPACE" --timeout=240s

      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Rollout failed. Initiating rollback..."
          kubectl rollout undo deployment/identity-service --namespace "$NAMESPACE" 2>/dev/null || true
          kubectl rollout undo deployment/catalog-service --namespace "$NAMESPACE" 2>/dev/null || true
          kubectl rollout undo deployment/chatbot-service --namespace "$NAMESPACE" 2>/dev/null || true
          echo "⏳ Waiting for rollback to complete..."
          kubectl rollout status deployment/identity-service --namespace "$NAMESPACE" --timeout=300s 2>/dev/null || true
          kubectl rollout status deployment/catalog-service --namespace "$NAMESPACE" --timeout=300s 2>/dev/null || true
          kubectl rollout status deployment/chatbot-service --namespace "$NAMESPACE" --timeout=300s 2>/dev/null || true
          echo "✅ Rollback completed (or attempted) for all services"
          # Notify about rollback
          echo "ROLLBACK_TRIGGERED=true" >> $GITHUB_ENV

      - name: Health check post-deploy
        run: |
          echo "Waiting for services to be ready..."
          sleep 15
          PUBLIC_URL="$(printf '%s' "${{ vars.PUBLIC_BASE_URL || 'https://bibliotechu.duckdns.org' }}" | tr -d '\n\r')"
          endpoints=(
            "$PUBLIC_URL/health"
            "$PUBLIC_URL/api/catalog/health"
            "$PUBLIC_URL/api/chatbot/health"
          )
          all_passed=true
          for endpoint in "${endpoints[@]}"; do
            for i in {1..12}; do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$endpoint" 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "✅ $endpoint (HTTP $HTTP_CODE)"
                break
              fi
              echo "  Attempt $i: $endpoint → HTTP $HTTP_CODE, retrying..."
              sleep 10
            done
            # After all retries, check one last time
            FINAL_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$endpoint" 2>/dev/null || echo "000")
            if [ "$FINAL_CODE" != "200" ]; then
              echo "❌ $endpoint failed after retries (HTTP $FINAL_CODE)"
              all_passed=false
            fi
          done
          if [ "$all_passed" = false ]; then
            echo "❌ Some health checks failed. Consider manual rollback:"
            echo "   .\\azure\\rollback.ps1"
            exit 1
          fi
          echo "✅ All health checks passed"

      - name: Initialize database (if needed)
        run: |
          INIT_SQL_PATH="./init.sql"
          if [ ! -f "$INIT_SQL_PATH" ]; then
            echo "init.sql not found at $INIT_SQL_PATH, skipping DB initialization"
            exit 0
          fi
          # Find postgres pod
          PG_POD=$(kubectl get pods -n "$NAMESPACE" -l app=postgresql -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ -z "$PG_POD" ]; then
            echo "No in-cluster PostgreSQL pod found. Database is managed externally (Azure DB for PostgreSQL)."
            echo "Skipping init.sql execution (run manually via psql or Azure portal)."
            exit 0
          fi
          # Check if database is empty
          TABLE_COUNT=$(kubectl exec -n "$NAMESPACE" "$PG_POD" -- psql -U postgres -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public';" 2>/dev/null | xargs)
          if [ "$TABLE_COUNT" -gt 0 ] 2>/dev/null; then
            echo "Database already has $TABLE_COUNT tables. Skipping initialization."
            exit 0
          fi
          echo "Initializing database with init.sql..."
          kubectl cp "$INIT_SQL_PATH" "$NAMESPACE/$PG_POD:/tmp/init.sql" --container=postgresql 2>/dev/null
          kubectl exec -n "$NAMESPACE" "$PG_POD" -- psql -U postgres -f /tmp/init.sql
          echo "✅ Database initialized successfully"
