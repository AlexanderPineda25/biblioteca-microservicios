services:
  postgres:
    image: postgres:16-alpine
    container_name: biblioteca_postgres
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: biblioteca_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: biblioteca_redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  catalog-service:
    build: ./catalog-service
    container_name: biblioteca_catalog
    env_file:
      - ../.env
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: catalog_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      AUTH_SERVICE_URL: http://identity-service:5132
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4173}
      AI_PROVIDER: ${AI_PROVIDER:-huggingface}
      HF_MODEL: ${HF_MODEL:-facebook/bart-large-mnli}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      identity-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  chatbot-service:
    build: ./chatbot-service
    container_name: biblioteca_chatbot
    env_file:
      - ../.env
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      AUTH_SERVICE_URL: http://identity-service:5132
      CATALOG_SERVICE_URL: http://catalog-service:3002
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4173,http://localhost:5173}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-mistralai/mistral-7b-instruct:free}
      OPENROUTER_REFERER: ${OPENROUTER_REFERER:-http://localhost:4173}
      OPENROUTER_TITLE: ${OPENROUTER_TITLE:-Biblioteca U}
      REDIS_URL: redis://redis:6379
      CHATBOT_STREAM_NAME: ${CHATBOT_STREAM_NAME:-chatbot_events}
      CHATBOT_STREAM_GROUP: ${CHATBOT_STREAM_GROUP:-chatbot_logger}
    depends_on:
      identity-service:
        condition: service_started
      catalog-service:
        condition: service_started
      redis:
        condition: service_healthy

  identity-service:
    build: ./mini-identity-api-dotnet-main/mini-identity-api-dotnet-main
    container_name: biblioteca_identity
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4173}
    ports:
      - "5132:5132"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
