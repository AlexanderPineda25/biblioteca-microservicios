apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: biblioteca

resources:
  - namespace.yaml
  - configmap.yaml
  - postgres.yaml
  - rabbitmq.yaml
  - redis.yaml
  - identity-service.yaml
  - catalog-service.yaml
  - chatbot-service.yaml
  - ingress.yaml

configMapGenerator:
  - name: postgres-init-sql
    files:
      - init.sql

generatorOptions:
  disableNameSuffixHash: true
